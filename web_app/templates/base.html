<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resume Builder{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: #e2e8f0;
            background: #0f172a;
        }

        nav {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            color: #e2e8f0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        nav .brand { font-weight: 700; font-size: 18px; margin-right: auto; color: #f8fafc; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 6px 0; }
        nav a:hover, nav a.active { color: #f8fafc; text-decoration: underline; }

        main {
            max-width: 640px;
            margin: 24px auto;
            padding: 0 16px;
        }

        h1 { font-size: 22px; margin-bottom: 16px; color: #f8fafc; }
        h2 { font-size: 18px; margin: 24px 0 8px; color: #f97316; }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            color: #94a3b8;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            font-size: 16px; /* prevents iOS zoom */
            padding: 10px 12px;
            border: 1px solid #334155;
            border-radius: 6px;
            margin-bottom: 12px;
            font-family: inherit;
            background: #0f172a;
            color: #e2e8f0;
        }
        textarea { resize: vertical; line-height: 1.5; }
        input:focus, textarea:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 2px rgba(249,115,22,0.2);
        }

        .btn {
            display: inline-block;
            font-size: 16px;
            font-weight: 600;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            min-height: 44px;
            transition: background 0.15s;
        }
        .btn-primary { background: #f97316; color: #0f172a; }
        .btn-primary:hover { background: #ea6c0a; }
        .btn-success { background: #16a34a; color: white; }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: #dc2626; color: white; padding: 8px 14px; font-size: 14px; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #334155; color: #e2e8f0; padding: 8px 14px; font-size: 14px; }
        .btn-secondary:hover { background: #475569; }
        .btn-full { display: block; width: 100%; }

        .banner {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .banner-warning { background: #422006; border: 1px solid #92400e; color: #fcd34d; }
        .banner-success { background: #052e16; border: 1px solid #166534; color: #86efac; }
        .banner-error { background: #4c0519; border: 1px solid #9f1239; color: #fca5a5; }
        .banner a { color: inherit; font-weight: 600; }

        .field-group { margin-bottom: 16px; }
        .field-row { display: flex; gap: 8px; align-items: start; }
        .field-row .field-grow { flex: 1; }

        .help-text { font-size: 13px; color: #64748b; margin-bottom: 12px; }

        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid #334155;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .exp-header {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .exp-header .company { font-weight: 700; color: #f97316; }
        .exp-header .role { font-weight: 600; color: #f1f5f9; }
        .exp-header .meta { font-size: 13px; color: #64748b; }

        .bullet-row { display: flex; gap: 8px; align-items: start; margin-bottom: 6px; }
        .bullet-row textarea { margin-bottom: 0; }
        .bullet-row .btn-danger { flex-shrink: 0; align-self: center; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <span class="brand">Resume Builder</span>
        <a href="/generate" {% if active_page == 'generate' %}class="active"{% endif %}>Generate</a>
        <a href="/setup" {% if active_page == 'setup' %}class="active"{% endif %}>My Docs</a>
        <a href="/profile" {% if active_page == 'profile' %}class="active"{% endif %}>Profile</a>
    </nav>
    <main>
        {% if flash_message %}
        <div class="banner banner-{{ flash_type or 'success' }}">{{ flash_message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
